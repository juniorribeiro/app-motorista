# ============================================================
# Docker Compose — Produção (DriverDash)
# ============================================================
# Uso:
#   1. Copie .env.prod.example para .env.prod e preencha as variáveis
#   2. docker compose -f docker-compose-prod.yml --env-file .env.prod up -d --build
#   3. Todas as portas expostas são no loopback (127.0.0.1)
# ============================================================

services:
  # --------------------------------------------------------
  # MySQL 8.0 — Banco de dados
  # --------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: driver-dash-mysql-prod
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-driver_dash}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "127.0.0.1:3012:3306"

    volumes:
      - mysql-data-prod:/var/lib/mysql
      - ./backend/db/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro

    networks:
      - driver-dash-internal

    # Segurança: filesystem read-only não é compatível com MySQL,
    # mas aplicamos todas as outras restrições
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - CHOWN
      - FOWNER

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------
  # Backend — API Node.js
  # --------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: driver-dash-backend-prod
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "127.0.0.1:3013:3001"

    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-driver_dash}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

    networks:
      - driver-dash-internal

    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------
  # Frontend — Vite/React servido via Nginx
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: driver-dash-frontend-prod
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "127.0.0.1:3014:8080"

    networks:
      - driver-dash-internal

    read_only: true
    tmpfs:
      - /var/cache/nginx:size=50m,mode=1777
      - /var/run:size=1m,mode=1777
      - /tmp:size=10m,mode=1777
      - /var/log/nginx:size=10m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# Volumes persistentes
# ============================================================
volumes:
  mysql-data-prod:
    driver: local

# ============================================================
# Rede interna (sem acesso externo entre containers)
# ============================================================
networks:
  driver-dash-internal:
    driver: bridge
    internal: false
